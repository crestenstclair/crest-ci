name: Chain
on: push
jobs:
  build:
    runs-on: [ubuntu-latest]
    steps:
      - run: make build
  test:
    needs: build
    runs-on: [ubuntu-latest]
    steps:
      - run: make test
  deploy:
    needs: test
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: [ubuntu-latest]
    steps:
      - run: make deploy
