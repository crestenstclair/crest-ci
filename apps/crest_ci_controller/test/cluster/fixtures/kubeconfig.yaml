apiVersion: v1
kind: Config
current-context: laptop-cert-context
clusters:
  - name: laptop-cluster
    cluster:
      server: https://127.0.0.1:6443
      certificate-authority-data: bGFwdG9wLWNhLWRhdGE=
  - name: staging-cluster
    cluster:
      server: https://staging.crest-ci.example.com:6443
      certificate-authority-data: c3RhZ2luZy1jYS1kYXRh
contexts:
  - name: laptop-cert-context
    context:
      cluster: laptop-cluster
      user: laptop-cert-user
  - name: staging-token-context
    context:
      cluster: staging-cluster
      user: staging-token-user
users:
  - name: laptop-cert-user
    user:
      client-certificate-data: bGFwdG9wLWNlcnQtZGF0YQ==
      client-key-data: bGFwdG9wLWtleS1kYXRh
  - name: staging-token-user
    user:
      token: staging-secret-token-abc123
